name: detection-harness

# CI only checks out and tests: a read-only token means a compromised step or
# dependency can look at the repo but not write to it.
permissions:
  contents: read

# push is scoped to main so PR commits run once (as pull_request), not twice.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Repo-wide quality gates. Format check runs before lint so a missed format
  # pass surfaces as its root cause rather than as downstream E501 noise.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          # The ruff pin lives inline below, so key the cache on this file:
          # bumping the pin invalidates it; other workflow edits over-invalidate
          # harmlessly.
          cache-dependency-path: .github/workflows/ci.yml
      - run: pip install ruff==0.15.18
      - name: Format check (ruff)
        run: ruff format --check .
      - name: Lint (ruff)
        run: ruff check .

  # YARA detection harness: rules + corpus regression suite.
  harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          # Install from the fully-resolved lock (every transitive dep pinned +
          # hashed), so key the cache on it: regenerating the lock invalidates
          # the cache; editing the requirements.txt source without recompiling
          # doesn't (and shouldn't -- the lock is what gets installed).
          cache-dependency-path: requirements.lock
      # Hashes in the lock put pip in --require-hashes mode automatically, so a
      # tampered or unpinned transitive dep fails the install rather than silently
      # resolving to something new.
      - run: pip install -r requirements.lock
      - run: pytest -v

  # Enrichment MCP server: unit tests over its pure logic. Importing the module
  # under test also supersedes the old compileall syntax-check.
  enrichment-mcp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          # The dev lock is the single fully-resolved input to this install
          # (runtime + test deps, all transitive pins + hashes), so the cache
          # key hashes it alone.
          cache-dependency-path: enrichment-mcp/requirements-dev.lock
      - run: pip install -r enrichment-mcp/requirements-dev.lock
      - run: pytest enrichment-mcp -v

  # Single aggregate gate. Branch protection requires only this check, so jobs
  # can be added or renamed above without touching the protection rule - just
  # list them in `needs` below. Every needed job must SUCCEED: anything else
  # (failure, cancelled, or skipped) fails this gate. Skipped is treated as a
  # failure on purpose, so no job can silently drop out of the required set;
  # revisit once path-filtered jobs are deliberately set up.
  all-green:
    if: always()
    needs: [lint, harness, enrichment-mcp]
    runs-on: ubuntu-latest
    steps:
      - name: Require every needed job to have succeeded
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          echo "needed job results: $results"
          for r in $results; do
            if [ "$r" != "success" ]; then
              echo "A required job did not succeed (got '$r'). Blocking merge."
              exit 1
            fi
          done
