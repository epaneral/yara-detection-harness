name: detection-harness

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Formatting gate first: --check fails (without rewriting) if anything
      # isn't `ruff format`-clean. Running it before lint surfaces "you forgot
      # to format" as the root cause, instead of its downstream E501 noise.
      - name: Format check (ruff)
        run: pipx run --spec ruff==0.15.18 ruff format --check .
      # Lint gate: catches undefined names, dead imports, blind-except, etc.
      # across the whole repo (test harness + enrichment MCP server).
      - name: Lint (ruff)
        run: pipx run --spec ruff==0.15.18 ruff check .
      # Syntax-check the enrichment MCP server (separate component, own deps).
      # py_compile/compileall parses without importing, so this needs no install.
      - name: Syntax-check enrichment MCP server
        run: python -m compileall -q enrichment-mcp -x "\.venv"
      - run: pip install -r requirements.txt
      - run: pytest -v
